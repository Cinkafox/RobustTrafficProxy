services:
  proxy:
    build: .
    container_name: game-traffic-proxy
    ports:
      - "12121:12121/udp"
      - "12121:12121/tcp"
    environment:
      - TARGET_HOST=gameserver
      - TARGET_PORT=1212
    command: ["-l", "0.0.0.0:12121", "-t", "${TARGET_HOST:-gameserver}:${TARGET_PORT:-1212}"]
    restart: unless-stopped
